<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}
    </title>

    {% if site.plugins contains 'jekyll-seo-tag' %} {% seo %} {% else %}
    <meta name="description" content="{{ site.description }}" />
    {% endif %}

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ '/assets/css/custom.css' | relative_url }}"
    />

    <link
      rel="preload"
      as="image"
      href="{{ '/assets/images/cxr7-1m_stats.svg' | relative_url }}"
    />
    <link
      rel="preload"
      as="image"
      href="{{ '/assets/images/causal_graph.svg' | relative_url }}"
    />
    <link
      rel="preload"
      as="image"
      href="{{ '/assets/images/vae.svg' | relative_url }}"
    />
    <link
      rel="preload"
      as="image"
      href="{{ '/assets/images/models.svg' | relative_url }}"
    />
    <link
      rel="preload"
      as="image"
      href="{{ '/assets/images/fdd_table.svg' | relative_url }}"
    />
    <link
      rel="preload"
      as="image"
      href="{{ '/assets/images/ab_test_results.svg' | relative_url }}"
    />
  </head>

  <body>
    <main class="container">{{ content }}</main>

    <link rel="stylesheet" href="{{ '/assets/css/game.css' | relative_url }}" />
    <script src="{{ '/assets/js/game.js' | relative_url }}" defer></script>
    <script
      src="{{ '/assets/js/figure-viewer.js' | relative_url }}"
      defer
    ></script>
    <script src="{{ '/assets/js/scrollspy.js' | relative_url }}" defer></script>

    {% include footer.html %}
  </body>
</html>
